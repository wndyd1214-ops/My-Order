<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인생맥주 실시간 발주</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #262626;
            --color-juyong: #3498db; 
            --color-mingu: #ff6b81;  
            --color-sujeong: #b2bec3; 
            --neon-pink: #ff007f;
            --gold: #d4af37;
            --point-red: #ff4d4d;
        }

        body { background-color: var(--bg-color); color: #e0e0e0; font-family: 'Pretendard', sans-serif; display: flex; justify-content: center; padding: 50px 0; margin: 0; }
        .container { width: 450px; background: var(--card-bg); padding: 30px; border-radius: 40px; border: 3px solid var(--gold); box-shadow: 0 0 20px rgba(212, 175, 55, 0.3); }
        .title { font-size: 50px; font-weight: 900; color: #fff; text-align: center; margin-bottom: 25px; text-shadow: 0 0 15px var(--neon-pink); }
        
        .user-nav { display: flex; justify-content: space-around; margin-bottom: 25px; border-bottom: 2px solid #444; padding-bottom: 15px; }
        .nav-item { cursor: pointer; padding: 8px 20px; font-weight: bold; font-size: 18px; border-radius: 15px; transition: 0.3s; opacity: 0.5; }
        .nav-item.active { opacity: 1; transform: scale(1.1); }
        .nav-item[data-user="juyong"] { color: var(--color-juyong); }
        .nav-item[data-user="mingu"] { color: var(--color-mingu); }
        .nav-item[data-user="sujeong"] { color: var(--color-sujeong); }
        .nav-item.active[data-user="juyong"] { background: var(--color-juyong); color: white; }
        .nav-item.active[data-user="mingu"] { background: var(--color-mingu); color: white; }
        .nav-item.active[data-user="sujeong"] { background: var(--color-sujeong); color: white; }

        .cat-title { color: var(--gold); font-size: 16px; margin: 25px 0 10px 5px; border-left: 4px solid var(--gold); padding-left: 10px; font-weight: bold; }
        .item-row { background: #111; border-radius: 12px; padding: 10px 15px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--gold); }
        .star-red { color: var(--point-red); font-weight: bold; margin-left: 2px; }
        
        .item-row input { background: #222; border: 1px solid #444; border-radius: 5px; color: white; text-align: right; width: 60px; padding: 8px; font-size: 16px; }
        
        .btn-group-bottom { display: flex; gap: 10px; margin-bottom: 15px; margin-top: 30px;}
        .btn-dark { flex: 1; padding: 18px; border-radius: 15px; border: 2px solid var(--gold); background: #111; color: var(--gold); font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-dark:active { background: var(--gold); color: #111; }

        .result-box { background: #000; min-height: 150px; border-radius: 20px; padding: 20px; border: 2px solid #333; line-height: 1.8; }
        .res-group { margin-bottom: 20px; padding: 5px 10px; border-radius: 10px; }
        .res-item { font-size: 15px; font-weight: 500; }
        
        .text-juyong { color: var(--color-juyong); border-left: 4px solid var(--color-juyong); }
        .text-mingu { color: var(--color-mingu); border-left: 4px solid var(--color-mingu); }
        .text-sujeong { color: var(--color-sujeong); border-left: 4px solid var(--color-sujeong); }
        
        .badge-add { color: #f1c40f; font-weight: bold; font-size: 13px; }
    </style>
</head>
<body>

<div class="container">
    <h1 class="title">인생맥주</h1>
    
    <nav class="user-nav">
        <span class="nav-item active" data-user="juyong" onclick="setUser('juyong', this)">주용</span>
        <span class="nav-item" data-user="mingu" onclick="setUser('mingu', this)">민구</span>
        <span class="nav-item" data-user="sujeong" onclick="setUser('sujeong', this)">수정</span>
    </nav>

    <div id="item-list"></div>

    <div class="btn-group-bottom">
        <button class="btn-dark" onclick="addOrder()">ORDER (발주전송)</button>
        <button class="btn-dark" onclick="resetAll()">RESET (전체삭제)</button>
    </div>

    <div class="result-box" id="resArea">
        <div style="color:#666; text-align:center; padding-top:50px;">연결 중...</div>
    </div>
</div>

<script>
    // 🔗 사장님의 Firebase 주소 자동 연동됨
    const firebaseConfig = { databaseURL: "https://my-order-d3713-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('orders');

    const menuData = {
        "🐔 육류 / 닭 관련": ["계육(5개/박스)", "순살치킨", "테바나카(닭날개)", "닭껍질튀김", "닭발"],
        "🐷 돼지고기 / 소고기류": ["돈삼겹슬라이스", "우삼겹", "민찌", "부대찌개햄"],
        "🐟 수산물 / 해산물 / 어묵류": ["바지락", "홍합", "불꽃오징어", "반건조오징어", "양념먹태", "손질먹태 70g", "손질먹태 130g", "튀김쥐포", "장쥐포", "교자만두", "부산어묵사각", "꼬치어묵"],
        "🍟 튀김 / 감자 / 간식류": ["미국식치즈스틱", "길감자(20개/박스)", "모듬감자 (최소20봉)", "스트레이트컷", "시즌드배터드후라이즈", "포테이토칩", "모듬소시지", "말발굽소시지", "왕돈까스", "타코야끼", "호떡", "멕시칸불고기피자", "마카로니 과자"],
        "🍢 꼬치류": ["염통꼬치", "은행꼬치", "물떡꼬치"],
        "🍜 면 / 떡 / 곡류": ["밀떡볶이", "칼국수면", "쌀국수면", "우동면", "사리면", "당면", "분모자", "짜빠게티", "불닭볶음면", "항아리김치수제비 원팩"],
        "🧂 양념 / 소스 / 조미료": ["뿌링클시즈닝", "위벨롭시즈닝", "허니버터맛시즈닝", "쌀국수분말", "미원", "혼다시", "맛소금", "후추가루", "파슬리", "소고기다시다", "건고추", "참깨", "설탕", "부침가루", "튀김가루", "멸치육수", "돼지불고기양념", "초고추장", "양조간장", "굵은고춧가루", "고운고춧가루(매운맛)", "빠이탄", "우동다시", "물엿", "케찹", "치폴레소스", "양념치킨소스", "매운데리야끼", "불닭소스", "불닭마요소스", "렌치 드레싱", "꼬치양념소스", "칠리소스", "떡볶이소스", "머스타드", "크리미버터소스", "퐁듀치즈소스", "데리야끼", "마요네즈", "돈가스소스", "아카시아청", "올리브유", "식용유", "참기름", "들기름"],
        "🧀 치즈 / 유제품": ["눈꽃치즈", "체다슬라이스치즈", "아이스크림", "연유", "크림"],
        "🧄 채소 / 신선식품": ["대파", "양파", "감자", "숙주", "홍고추", "청양고추", "새송이버섯 (2kg)", "계란", "다진마늘", "양배추"],
        "🧃 디저트 / 음료": ["파인애플샤베트", "파인애플"],
        "🧻 소모품 / 위생용품": ["유산지", "치킨박스", "호일", "키친타올", "일회용비닐봉투", "음식물쓰레기봉투", "철수세미", "목장갑"],
        "🧼 세제 / 청소용품": ["락스", "퐁퐁", "식기세척기 세제(분홍색)", "식기세척기 린스 (파란색)"],
        "🥜 기타 식재료": ["피땅콩", "줄줄이김", "가쓰오부시", "치킨무", "김가루"],
        "🍽 포장용기": ["냉면용기", "사각용기 12개짜리", "사각용기 8개짜리", "소스종지", "종이봉투", "전용기", "배달 포장봉지 중", "배달 포장봉지 소"]
    };

    let currentUser = 'juyong';
    const userColors = { juyong: 'text-juyong', mingu: 'text-mingu', sujeong: 'text-sujeong' };

    // 메뉴판 생성
    const itemList = document.getElementById('item-list');
    for (let cat in menuData) {
        let div = document.createElement('div');
        div.innerHTML = `<div class="cat-title">${cat}</div>`;
        menuData[cat].forEach(it => {
            let starLabel = (it.includes("밀떡볶이") || it.includes("계육")) ? "<span class='star-red'>★</span>" : "";
            let r = document.createElement('div');
            r.className = 'item-row';
            r.innerHTML = `<label>${it}${starLabel}</label><input type="number" id="input-${it}" placeholder="0">`;
            div.appendChild(r);
        });
        itemList.appendChild(div);
    }

    function setUser(u, el) {
        currentUser = u;
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    // 서버로 데이터 전송
    function addOrder() {
        let hasValue = false;
        document.querySelectorAll('#item-list input').forEach(input => {
            let v = parseInt(input.value);
            if (v > 0) {
                let itemName = input.id.replace('input-', '');
                db.push({
                    user: currentUser,
                    item: itemName,
                    qty: v,
                    timestamp: Date.now()
                });
                input.value = "";
                hasValue = true;
            }
        });
        if(!hasValue) alert("수량을 입력해주세요.");
    }

    // 서버 데이터 실시간 감시 및 화면 업데이트
    db.on('value', (snapshot) => {
        const data = snapshot.val();
        const resArea = document.getElementById('resArea');
        resArea.innerHTML = "";
        
        if (!data) {
            resArea.innerHTML = `<div style="color:#666; text-align:center; padding-top:50px;">발주 내역이 비어있습니다.</div>`;
            return;
        }

        // 시간순 정렬
        const allOrders = Object.values(data).sort((a, b) => a.timestamp - b.timestamp);
        const userGroups = { juyong: [], mingu: [], sujeong: [] };
        const firstSeenItem = {};

        allOrders.forEach(order => {
            // 추가주문 로직: 이전에 어떤 유저든 이 품목을 시킨 적이 있으면 ★추가주문 표시
            let addTag = "";
            if (firstSeenItem[order.item]) {
                addTag = " <span class='badge-add'>★추가주문</span>";
            }
            firstSeenItem[order.item] = true;

            userGroups[order.user].push(`<div class="res-item">• ${order.item}: ${order.qty}개${addTag}</div>`);
        });

        // 화면에 출력
        ['juyong', 'mingu', 'sujeong'].forEach(user => {
            if (userGroups[user].length > 0) {
                let userDiv = document.createElement('div');
                userDiv.className = `res-group ${userColors[user]}`;
                userDiv.innerHTML = userGroups[user].join('');
                resArea.appendChild(userDiv);
            }
        });
    });

    // 전체 삭제 (서버 초기화)
    function resetAll() {
        if(confirm("정말로 모든 실시간 내역을 초기화할까요?")) {
            db.set(null);
        }
    }
</script>

</body>
</html>
